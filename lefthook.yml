pre-commit:
  parallel: true
  jobs:
    - name: eslint
      glob: '*.{ts,mjs,js}'
      run: pnpm exec eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true

    - name: prettier
      glob: '*.{json,yaml,yml,mjs,mts,ts,js}'
      exclude:
        - 'src/**'
        - 'pnpm-lock.yaml'
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
