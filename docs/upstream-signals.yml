    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-09
    status: implemented
    priority: p1
    target_area:
      - powerpoint-repair
      - invalid-ooxml
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: round2SameRect with rectRadius reportedly causes PowerPoint repair and disappears.
    current_project_notes: >
      Root cause: genXmlPresetGeom emitted <a:gd name="adj"> for all rectRadius
      shapes, but round2SameRect (and round2DiagRect) use adj1/adj2 per the
      ECMA-376 Annex D preset shape definitions. PowerPoint did not recognise the
      unknown "adj" guide and triggered repair. Fixed by adding RECT_RADIUS_ADJ1_SHAPES
      set in gen-xml.ts; when the shape is in that set, adj1 is emitted from the
      rectRadius value and adj2 is emitted as val 0 (spec default — bottom pair
      sharp). Schema fixture round2-rect-adj1-adj2 covers both shapes and passes
      the OOXML validator.
    evidence:
      kinds:
        - local-source-inspection
        - schema-fixture
      local_files:
        - src/gen-xml.ts:92
        - test/schema.test.js
      schema_fixture: round2-rect-adj1-adj2
      validator_result: pass
      powerpoint_result: null
      spec_refs:
        - "ECMA-376 Part 1 Annex D presetShapeDefinitions.xml (round2SameRect, round2DiagRect)"
