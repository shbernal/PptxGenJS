  - id: upstream-issue-1355
    source: "gitbrent/PptxGenJS#1355"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-10
    status: implemented
    priority: p1
    target_area:
      - chart-ooxml
      - powerpoint-repair
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: Combo chart using bar plus scatter triggered PowerPoint repair.
    current_project_notes: >
      Root cause confirmed by repro: a scatter subchart's category (X) axis must
      be emitted as <c:valAx>, but makeCatAxis only converted to valAx when the
      scalar opts._type === SCATTER. In combo charts opts._type is the subchart
      array, so the scatter's X axis was emitted as <c:catAx>, which PowerPoint
      repairs. Fix tracks, per category axis, which subchart type owns it and
      injects an effective _type into the makeCatAxis call so scatter/bubble X
      axes emit <c:valAx>. The genuinely unsatisfiable case (a category chart and
      a scatter sharing one axis) now warns instead of emitting a broken file.
      Verified with a schema fixture against OOXMLValidatorCLI.
    evidence:
      kinds:
        - local-source-inspection
        - schema-fixture
        - validator-result
      local_files:
        - src/gen-charts.ts:567
        - src/gen-charts.ts:591
