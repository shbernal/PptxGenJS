  - id: upstream-issue-1449
    source: "gitbrent/PptxGenJS#1449"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-11
    status: implemented
    priority: p0
    target_area:
      - powerpoint-repair
      - invalid-ooxml
      - relationship-or-content-type
      - speaker-notes-masters-layouts
    applies_to_current_project: partial
    non_target_reasons: []
    upstream_summary: Umbrella report of PowerPoint repair defects seen in a large generated deck.
    current_project_notes: >
      Umbrella of six defects; triage by subclaim. Defect 5 (notesMaster
      placeholders) is the same root cause as #1443 and is now IMPLEMENTED via
      commit a4bb5ad4 (notesMaster owns theme2.xml); its placeholders are valid
      and were deliberately not stripped — see upstream-issue-1443. Defect 1/2
      (invalid shape presets emit corrupt prst) is now IMPLEMENTED:
      addShapeDefinition() validates the resolved preset against
      VALID_SHAPE_PRESETS (ECMA-376 ST_ShapeType values from SHAPE_TYPE plus the
      unexposed connectors, plus custGeom) and throws on anything else instead of
      emitting an invalid <a:prstGeom prst="...">. While wiring this up we also
      found and fixed three latent invalid presets shipped by our own enum/union:
      'folderCorner' -> 'foldedCorner' (spec spelling), and removed the four
      LINE_CALLOUT_4* entries (borderCallout4 / accentCallout3=4 /
      accentBorderCallout4 / callout4) which have no ST_ShapeType equivalent and
      only ever produced corrupt files. Validation is enforced at two layers: a
      friendly throw in addShapeDefinition, plus a safety net in genXmlPresetGeom()
      so the addText/addImage `shape` options (which bypass addShape) also reject
      invalid presets. The shared allow-list is exported from core-enums as
      VALID_SHAPE_PRESETS. The remaining package-scaffold subclaims are all
      IMPLEMENTED as well (re-verified 2026-06-11): Defect 3 (per-slide phantom
      slideMaster Content_Types Overrides) — makeXmlContTypes emits a single
