    target_area:
      - table-ooxml
      - missing-pptx-feature
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: Colspan table cells did not apply configured borders across the full merged span.
    current_project_notes: >
      Fixed. The dummy hMerge/vMerge span cells used to emit an empty
      <a:tcPr/>, dropping the merged region's outer edges (e.g. a colspan's
      right border lives on the rightmost hMerge cell, a rowspan's bottom border
      on the lowest vMerge cell). Span construction now records the origin cell
      via a new TableCell._spanOrigin reference, and the span branch in
      slideObjectToXml emits the origin's border tuple (via the extracted
      genTableCellBorderXml helper, shared with normal cells) plus the origin's
      resolved fill so the merged region renders its edges and fills uniformly,
      matching PowerPoint-authored output. Schema fixture validates; regression
      test asserts lnR/red on the hMerge cell and lnB/blue on the vMerge cell.
    evidence:
      kinds:
        - local-source-inspection
        - schema-fixture
        - validator-result
        - regression-test
      local_files:
        - src/gen-xml.ts (genTableCellBorderXml helper + span-cell branch)
        - src/core-interfaces.ts (TableCell._spanOrigin)
        - test/regression/table-merged-cell-borders.test.js
        - test/schema.test.js (table with merged cells carrying borders and fill)
      schema_fixture: test/schema.test.js (table with merged cells carrying borders and fill)
      validator_result: pass
      powerpoint_result: null
