  - id: upstream-issue-1339
    source: "gitbrent/PptxGenJS#1339"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-11
    status: implemented
    priority: p3
    target_area:
      - image-svg-media
      - missing-pptx-feature
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: Duplicate images should be detected by content hash to reduce package size.
    current_project_notes: >
      Implemented in two layers. (1) Per-slide: addImageDefinition and
      addMediaDefinition previously matched duplicates only on `path`, which
      never fired for inline media (all share the `preencoded.<extn>`
      placeholder); the find now falls back to exact `data`-payload equality
      when there is no real path, so identical inline media reuse the original
      `Target` within a slide. (2) Deck-wide (Option B): a global pass in
      exportPresentation, run after encodeSlideMediaRels has populated every
      `rel.data`, rewrites each later duplicate's `Target` to the first
      occurrence's across all slides/layouts/master, keyed on `extn` + bytes.
      This collapses the same image used on many slides (or loaded from the same
      path) to one package part, and also covers background images and the
      previously-unhandled SVG two-rId branch. Exact string equality is used
      rather than a content hash — sufficient and collision-free, and the data
      strings are already retained in `_relsMedia` so keying on them adds no
      meaningful memory. Sharing a media part across slide `.rels` is valid OOXML
      (rels reference media by rId).
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
      local_files:
        - src/gen-objects.ts:572
        - src/gen-objects.ts:698
        - src/pptxgen.ts:597
        - test/regression/image-data-dedup.test.js
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none

