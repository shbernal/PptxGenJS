    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-10
    status: implemented
    priority: p2
    target_area:
      - image-svg-media
      - missing-pptx-feature
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: Base64 image output appeared forced into the wrong aspect ratio.
    current_project_notes: >
      Fixed: addImage now defaults missing dimensions from the image's intrinsic
      size. For base64 `data` images the natural pixel size is read synchronously
      from the header (PNG/JPEG/GIF/BMP/WebP) via getImageSizeFromBase64 and
      applied at 96 DPI (natural px / 96 = inches). When only one of w/h is given,
      the other is derived from the natural aspect ratio. Path images and vector
      (SVG) data are not synchronously measurable, so they keep the 1in fallback.
      Reuses the existing decoder added for `sizing: cover|contain` srcRect work.
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
      local_files:
        - src/gen-objects.ts:448
        - src/gen-utils.ts:512
        - test/regression/image-intrinsic-size.test.js
      schema_fixture: null
      validator_result: null
