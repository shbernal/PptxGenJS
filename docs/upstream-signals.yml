  - id: upstream-issue-1443
    source: "gitbrent/PptxGenJS#1443"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-10
    status: implemented
    priority: p0
    target_area:
      - powerpoint-repair
      - speaker-notes-masters-layouts
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: PowerPoint repair reportedly strips notesMaster placeholder shapes.
    current_project_notes: >
      Root cause was a shared theme relationship, not malformed placeholders.
      The notesMaster placeholder XML is verbatim PowerPoint-authored output and
      is valid; the reporter's stripped-placeholder observation was a side effect
      of PowerPoint regenerating the notes master while repairing the broken theme
      rel (notesMaster1.xml.rels pointed at the slideMaster's theme1.xml). Commit
      a4bb5ad4 gives the notesMaster its own theme2.xml part (rel target, a
      Content_Types Override, and the emitted part), which resolves the repair.
      The #1443 "strip placeholders to a minimal spTree" suggestion was a
      misdiagnosis and was deliberately NOT implemented: makeXmlNotesSlide
      placeholders inherit geometry/style from the notesMaster placeholders, so
      stripping them would orphan those inheritances and likely re-trigger repair.
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
      local_files:
        - src/gen-xml.ts:1920
        - src/gen-xml.ts:1571
        - src/pptxgen.ts:635
        - test/regression/theme-relationships.test.js
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none

