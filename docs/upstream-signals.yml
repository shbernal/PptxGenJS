  - id: upstream-issue-1286
    source: "gitbrent/PptxGenJS#1286"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-11
    status: implemented
    priority: p1
    target_area:
      - image-svg-media
      - invalid-ooxml
      - powerpoint-repair
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: Mixed pixel-like image dimensions above and below 100 produced invalid srcRect crop values and PowerPoint repair.
    current_project_notes: >
      Resolved. The mixed-unit root cause is already gone: coordToEmu
      (src/units.ts:84) dropped the old "a number >=100 is already EMU, <100 is
      inches" magnitude guess, so an object's two dimensions can no longer resolve
      in different units. cover/contain (src/gen-xml.ts:56) also now derive the
      srcRect from the image's natural pixel ratio (getImageSizeFromBase64,
      src/gen-utils.ts:512) rather than the displayed box. Locked in by a
      regression fixture reproducing the exact straddling-100 shape that used to
      trigger PowerPoint repair: a 200x80 image in a 120x80 box now emits an
      in-bounds srcRect for both cover and contain, with an explicit
      positive-source-area invariant.
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
      local_files:
        - src/units.ts:84
        - src/gen-xml.ts:56
        - src/gen-utils.ts:512
        - test/regression/image-cover-contain.test.js
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none

