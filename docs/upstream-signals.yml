  - id: upstream-issue-1309
    source: "gitbrent/PptxGenJS#1309"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-11
    status: implemented
    priority: p1
    target_area:
      - chart-ooxml
    applies_to_current_project: yes
    non_target_reasons: []
    upstream_summary: Chart formatCode options show correctly in LibreOffice but not in Microsoft Office or Google Slides.
    current_project_notes: >
      Root cause: PowerPoint and Google Slides render values using the cached
      *source* number format carried in each series'
      `<c:val>/<c:xVal>/<c:yVal><c:numRef><c:numCache><c:formatCode>` (Google
      Slides cannot read the embedded xlsx at all and renders purely from this
      chart-XML cache), NOT the `<c:dLbls><c:numFmt>` mask that LibreOffice
      honors. That value cache was hard-coded to "General" (and entirely absent
      from the pie/doughnut numCache), so those engines fell back to raw values
      (e.g. 0.1 instead of 10%). Implemented in makeChartType (gen-charts.ts):
      a single resolved `valFmtCode`
      (valLabelFormatCode || dataTableFormatCode || dataLabelFormatCode ||
      'General') is now stamped onto every value numCache — bar/line/area/radar
      c:val, scatter/bubble c:xVal+c:yVal, and the previously format-less
      pie/doughnut c:val. Because dataLabelFormatCode defaults to '#,##0', the
      value cache now mirrors that default, making PowerPoint/Google Slides agree
      with LibreOffice (deliberate consistency change). The category cache
      (catLabelFormatCode) and bubble-size cache are intentionally left alone.
      DEFERRED follow-up: styling the embedded workbook cells (styles.xml cellXfs
      + per-cell s=) so PowerPoint's "Edit Data in Excel" round-trip preserves
      the format — tracked jointly with [[upstream-issue-1430]]; not required for
      the reported display bug since Google Slides ignores the workbook entirely.
      Verified at the OOXML level (schema validator + regression assertions on the
      emitted numCache); a live PowerPoint render confirmation is still pending.
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
        - schema-fixture
        - validator-result
      local_files:
        - src/gen-charts.ts:783
        - src/gen-charts.ts:985
        - src/gen-charts.ts:1269
        - src/gen-charts.ts:1623
        - test/regression/chart-format-code.test.js
        - test/schema.test.js
      schema_fixture: chart-value-format-code-numcache
      validator_result: pass
      powerpoint_result: null
      spec_refs:
        - "ECMA-376 Part 1 §21.2.2.121 (CT_NumData / formatCode)"
    next_action: none

