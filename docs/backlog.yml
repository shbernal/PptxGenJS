    current_project_notes: >
      Resolved on inspection (2026-06-19): vertical alignment IS supported, at the
      level OOXML defines it. Vertical anchoring is a body-level property
      (CT_TextBodyProperties/@anchor), not a per-paragraph one — there is no
      per-paragraph vertical-align attribute in DrawingML. The fork already maps
      `valign: 'top'|'middle'|'bottom'` to `<a:bodyPr anchor="t|ctr|b">` for text
      shapes (gen-xml.ts:1537 via _bodyProp.anchor) and table cells (gen-xml.ts:629),
      which is the only construct that exists. A "rich-text / per-paragraph valign
      API" would have no valid OOXML to emit, so this is not a fork gap. The
      documented shape-level `valign` option is the answer.
