      a master/layout placeholder authored via defineSlideMaster with margin (→
      lIns/tIns/rIns/bIns) and/or valign (→ anchor) carries those into its layout
      placeholder bodyPr instead of degrading to the default. The bullet.type part
      was already covered. Pinned against the layout-placeholder-bodypr.pptx oracle
      by the schema fixture 'master/layout placeholder carries bodyPr insets +
      anchor' (test/schema.test.js): title bottom-anchored 18/9pt insets, body
      center-anchored 24/15/12/6pt insets, validator-clean. Companion:
      upstream-issue-1208 (same root cause).
