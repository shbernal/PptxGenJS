  - id: upstream-issue-1423
    source: "gitbrent/PptxGenJS#1423"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-19
    status: non-target
    priority: none
    target_area:
      - chart-ooxml
    applies_to_current_project: no
    non_target_reasons:
      - insufficient-evidence
    summary: Reports that manually adding a new dimension in the embedded Excel data does not update chart display.
    current_project_notes: >
      Reviewed 2026-06-19 against the generator. Charts emit a fixed reference range
      (e.g. <c:f>Sheet1!$A$2:$A$N</c:f>) sized to the supplied data, plus a matching
      numCache/strCache — standard, valid OOXML. A chart only plots what its c:f range
      covers; manually inserting a row in the embedded worksheet does NOT auto-extend
      that range in any viewer (auto-expansion is an Excel "Table"/structured-reference
      feature, not default chart behavior). So the reported "defect" is expected
      fixed-range behavior, not a generator bug, and the screenshot-only report shows
      no malformed range/cache. Marked non-target/insufficient-evidence. Reopen only
      if a repro shows the emitted c:f range or cache is itself malformed.
    evidence:
      kinds:
        - local-source-inspection
      local_files:
        - src/gen-charts.ts:973
        - src/gen-charts.ts:992
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none

