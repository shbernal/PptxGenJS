    summary: Fix placeholder text formatting on master slides, including margin, valign, and custom bullet handling.
    current_project_notes: >
      Implemented 2026-06-19. genXmlBodyProperties (src/gen-xml.ts) now emits the
      configured <a:bodyPr> for placeholder objects too, not only text objects: the
