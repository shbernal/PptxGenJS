      sizing:cover|contain is aspect-correct"), which this entry was not updated to
      reflect. getImageSizeFromBytes (src/gen-utils.ts) now detects an <svg>
      payload and calls getSvgSizeFromMarkup, which reads the intrinsic size from
      the root <svg> element following the SVG sizing model: an absolute
      width/height pair wins, otherwise the viewBox width/height defines the
      aspect ratio (percentage/missing lengths fall through to viewBox). The
      sizing path in gen-xml.ts feeds that natural size into fitSrcRectPercents
      just like the raster probes, so sizing:'cover'|'contain' now emits an
      aspect-correct <a:srcRect> for SVG instead of warning and falling back.
