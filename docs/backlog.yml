  - id: sf-fflate-zip-backend
    source: slide-factory
    type: downstream-need
    first_seen: 2026-06-20
    last_reviewed: 2026-06-20
    status: implemented
    priority: p3
    target_area:
      - package-boundary
    applies_to_current_project: yes
    non_target_reasons: []
    summary: Swap JSZip ZIP backend for fflate to cut generateAsync compression time on large decks.
    current_project_notes: >
      IMPLEMENTED (both phases) on branch feat/fflate-zip-backend; jszip dependency dropped.


      PHASE 1 (write path): A new `ZipWriter` seam (src/zip.ts) isolates all fflate contact:
      callers accumulate `add(path, string|bytes, {store})` and finalize with
      `generate(type, {compression})`, which maps fflate's single Uint8Array to the output-type
      matrix (nodebuffer/arraybuffer/blob/base64/binarystring/uint8array). src/pptxgen.ts and
      src/gen-charts.ts build through it; the `.folder()` scaffolding and the `hasCharts`
      empty-dir guard are deleted (fflate emits no directory entries), and the nested chart XLSX
      is embedded as raw STORE bytes instead of a base64 round-trip. The #1006 per-entry
      STORE-of-media carries over via per-file `level: 0`. Entries get a fixed mtime
      (2001-01-01) so archive bytes are reproducible.


      PHASE 2 (read path): src/zip.ts gained a `readZip(input)` reader (fflate `unzipSync` →
      ordered path->bytes Map, directory markers dropped) plus a `toUint8Array` normalizer that
      reproduces JSZip's default loadAsync input handling (string treated as a latin1 binary
      string, not base64; ArrayBuffer/Blob/number[]/Buffer all accepted). OpcPackage.load /
      OpcPackage.save and src/inspect.ts now go through src/zip.ts; OpcPackage.save builds via
      ZipWriter. The jszip runtime dependency was removed (moved to devDependencies — the
      round-trip suite still uses it as an independent zip oracle). Side fix: jszip's
      `/// <reference types="node" />` was the only thing pulling @types/node into the typecheck
      program, so tsconfig.json now sets `types: ["node"]` explicitly (matching the existing
      tsconfig.test.json / tsconfig.strict-null.json pattern). Verified: typecheck, build, lint,
      295 unit tests, 249 read+inspection tests (round-trip byte-identity, trash handling,
      content-type rejection, input variants), 98 schema/validator tests. Note OpcPackage.load
      already materialized every part to uint8array up front, so fflate's eager unzip did not
      change the edit core's memory profile (the original challenge #4 was moot).


      ASYNC FOLLOW-UP — BENCHMARKED 2026-06-23, DROPPED (see sf-fflate-async-zip): switching
      ZipWriter.toBytes/readZip to fflate's async zip()/unzip() was built and measured; it is
      byte-identical to the sync path but gives no wall-clock speedup (0.97-1.01x on 250/800-slide
      decks) because fflate's async zip() uses a single worker (no cross-core DEFLATE), and the
      only multi-core API (per-file AsyncZipDeflate) OOMs on a deck's thousands of small parts.
      The sync zipSync/unzipSync path therefore stays. Revisit only per the conditions recorded
      in sf-fflate-async-zip.


      ORIGINAL ANALYSIS — Deferred follow-up to the #1006 performance work (see upstream-issue-1006).
      The per-entry STORE-of-media fix removed the dominant cost for media-heavy
      decks, but the deeper root remains: JSZip compresses via single-threaded,
      pure-JS DEFLATE (pako). fflate is several times faster, zero-dependency,
      smaller, and supports streaming plus optional worker-parallel compression,
      so swapping the backend would speed up *all* output, not just media.


      Why deferred, not done now: it is a real refactor, not a drop-in. JSZip is
      used in four files with two shapes — build side (src/pptxgen.ts new JSZip /
      .folder / .file / generateAsync; src/gen-charts.ts nested XLSX zip) and
      parse side (src/read/opc/package.ts loadAsync + Object.values(zip.files) +
      entry.async + re-serialize; src/inspect.ts loadAsync + entry.async). Key
      challenges: (1) fflate is functional with no stateful archive/folder object,
      so the spread-out incremental accumulation must collect into one path->bytes
      map then zip once, and every helper taking `zip: JSZip` changes signature;
      (2) no base64/string conveniences — every base64 media hop and XML string
      must be hand-converted to Uint8Array; (3) the single generateAsync({type})
      output matrix (nodebuffer/blob/arraybuffer/uint8array/STREAM) collapses to
      Uint8Array and needs a per-type conversion shim; (4) fflate's unzip is eager,
      not lazy, changing the memory profile of the lossless read/edit round-trip
      core (feat/pptx-edit), which is the most fidelity-sensitive code here;
      (5) output bytes change (no directory entries, different ordering/levels), so
      golden/byte-compare/round-trip fixtures regenerate and OOXML validity must be
      re-verified; (6) fflate's async path uses workers by default, which may need
      bundler/Node-ESM config or a fallback to *Sync.


      Recommended path when picked up: introduce fflate on the WRITE path first
      (lower fidelity stakes), keep the read/edit loader on JSZip until parity is
      proven against the round-trip suite, then migrate the parse side. The
      per-entry STORE-of-media behaviour is more natural in fflate (per-file
      level 0), so the #1006 optimization carries over.
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
        - validator-result
      local_files:
        - src/zip.ts
        - src/pptxgen.ts:574
        - src/gen-charts.ts:34
        - src/read/opc/package.ts:42
        - src/inspect.ts:87
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none
  - id: sf-fflate-async-zip
    source: slide-factory
    type: downstream-need
    first_seen: 2026-06-20
    last_reviewed: 2026-06-23
    status: superseded
    priority: p3
    target_area:
      - package-boundary
    applies_to_current_project: yes
    non_target_reasons: []
    summary: Switch fflate ZIP backend from sync to worker-parallel async zip()/unzip() for the large-deck speedup.
    current_project_notes: |-
      BENCHMARKED 2026-06-23 — NO WALL-CLOCK WIN, staying deferred. Built the async
      swap (ZipWriter.toBytesAsync via fflate async zip(), readZip via async
      unzip(), threshold-gated) and benchmarked it against the current zipSync path
      on real deck parts (12-core box, fflate 0.8.3):
        - 250 slides / 6.17 MiB payload: zipSync 94 ms vs async 97 ms (0.97x)
        - 800 slides / 19.67 MiB payload: zipSync 330 ms vs async 326 ms (1.01x)
      Async output is byte-identical to sync but delivers NO speedup, because
      fflate's async zip() offloads the WHOLE archive to a SINGLE worker — it does
      not spread DEFLATE across cores. The only truly multi-core fflate API,
      streaming Zip + AsyncZipDeflate, spawns one worker PER FILE; a real PPTX deck
      has thousands of tiny parts (3217 at 800 slides), so it OOM-killed the process
      (exit 137/144). So the headline premise — "worker-parallel compression to cut
      generateAsync time" — is NOT achievable with fflate for PPTX-shaped workloads
      (many small parts). The single-worker async path's only residual benefit is
      freeing the event loop during compression (relevant to a live server/browser,
      not this Node-first batch library), which does not justify the worker
      complexity plus the small-deck worker-startup overhead. Code was reverted;
      src/zip.ts stays on zipSync/unzipSync.

      Original context (retained): follow-up to sf-fflate-zip-backend (implemented),
      which swapped JSZip -> fflate and already captured the faster single-threaded
      DEFLATE. This item was the unrealized "go parallel" half of that swap.
    evidence:
      kinds:
        - benchmark
        - generated-pptx
        - local-source-inspection
      local_files:
        - src/zip.ts
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none — superseded. The "go parallel" premise is closed — benchmarked with no wall-clock win, and fflate cannot parallelize PPTX part counts (single-worker zip() = no speedup; per-file AsyncZipDeflate OOMs on thousands of small parts). The single-threaded DEFLATE win that motivated this lives in the implemented sf-fflate-zip-backend. Revisit only if fflate gains a bounded-concurrency parallel zip, or if a concrete event-loop-offload (non-blocking generate inside a server/browser) need appears.
