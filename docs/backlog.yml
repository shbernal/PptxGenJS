schema: 1
# Upstream issue/PR tracking has been retired. This fork no longer fetches or
# reconciles against gitbrent/PptxGenJS; `source_repo` is kept only as provenance
# for the github-derived entries already recorded below.
source_repo: gitbrent/PptxGenJS
purpose: >
  The fork's project backlog ledger. It records work this project intends to do
  and decisions it has made: `downstream-need` items raised by the slide-factory
  consumer for generic PPTX behavior that belongs in this package, plus a set of
  retained upstream-derived signals from gitbrent/PptxGenJS that were judged
  relevant before upstream tracking was retired. New entries are project needs.
  The `source` field carries a github reference (owner/repo#N or a github.com
  issues/pull URL) for the retained legacy entries, or `slide-factory[:path]` for
  downstream needs. This file is no longer synced against GitHub; the upstream
  reconciliation tooling has been removed.
project_target_docs:
  - docs/project-target.md
  - docs/runtime-and-package-support.md
  - docs/agent-development.md
  - docs/ooxml-agent-context.md
  - docs/testing.md

# MAINTENANCE (agents):
# - Every vocabulary-constrained field (status, priority, target_area,
#   applies_to_current_project, non_target_reasons, evidence.kinds) must use a value
#   already listed under `vocabulary:` below. Reuse the closest existing term; never
#   invent a synonym (e.g. `validator-pass` instead of `validator-result`).
# - If nothing fits, ADD the new value to the relevant `vocabulary:` list in the same
#   edit (note why), then use it — extending the vocabulary on purpose is fine, drifting
#   off it by typo is not.
# - After ANY edit to this file, run `pnpm run backlog:validate` and fix every
#   error before committing. The validator keys on the `vocabulary:` lists in THIS file.
# - `source` must be consistent with `type`: issue/pull-request entries need a github
#   reference; downstream-need entries need `slide-factory` or `slide-factory:<path>`.
#   New downstream needs are easiest to add with `pnpm run backlog -- add` (see --help).

vocabulary:
  statuses:
    - needs-repro
    - target
    - accepted
    - interesting-with-tweaks
    - non-target
    - watch
    - deferred
    - implemented
    - partially-implemented
    - superseded
  priorities:
    - p0
    - p1
    - p2
    - p3
    - none
  target_areas:
    - powerpoint-repair
    - invalid-ooxml
    - schema-order
    - relationship-or-content-type
    - chart-ooxml
    - table-ooxml
    - image-svg-media
    - speaker-notes-masters-layouts
    - missing-pptx-feature
    - typescript-api
    - browser-modern-esm
    - package-boundary
  applies_to_current_project:
    - yes
    - partial
    - no
    - unknown
  non_target_reasons:
    - commonjs
    - iife-global
    - cdn-script-tag
    - legacy-dist-artifact
    - unsupported-runtime
    - upstream-build-system
    - release-matrix
    - docs-only-for-legacy-workflow
    - existing-pptx-import
    - not-reproducible-in-current-project
    - insufficient-evidence
    - out-of-project-scope
    - escape-hatch-footgun
  evidence_kinds:
    # Source / spec reading
    - local-source-inspection
    - ooxml-reference
    - microsoft-reference
    # Reproduction artifacts
    - minimal-repro
    - generated-pptx
    - extracted-xml
    # Automated tests / validation
    - regression-test
    - schema-fixture
    - validator-result
    # Performance measurement (timing/throughput spike, not a correctness test)
    - benchmark
    # Application-render verification
    - render-check
    - powerpoint-result
    - powerpoint-authored-comparison
  constructs:
    # OOXML construct identity for the slide-factory replication capability audit
    # (scripts/slide-analysis/replication). An entry tags the OOXML construct(s) it
    # gates so the consumer joins detected-construct -> gating-entry -> live status
    # directly off this ledger, with no hand-curated construct map. Keys are the
    # stable detector keys; the comment names the DrawingML element each identifies.
    - gradient-fill #         <a:gradFill> shape fill
    - gradient-line-stroke #  <a:gradFill> inside <a:ln>
    - custom-geom #           <a:custGeom> freeform geometry
    - preset-geom-exotic #    non-trivial <a:prstGeom> presets (blockArc/homePlate/textArch*)
    - text-warp #             <a:prstTxWarp> preset text warp
    - connector #             <p:cxnSp> connector autoShape
    - outer-shadow #          <a:outerShdw> drop shadow
    - bullet-char #           <a:buChar> symbol bullet
    - bullet-autonum #        <a:buAutoNum> auto-number bullet
    - group-scale #           scaled group (chOff/chExt vs off/ext)
    - group-rot-flip #        group <a:xfrm> @rot/@flipH/@flipV
    - autofit-shrink #        <a:normAutofit> shrink-to-fit text
    - autofit-resize #        <a:spAutoFit> resize-to-fit text (added 2026-06-21 for the measured-text-fit oracle)
    - vertical-text #         <a:bodyPr vert="…"> text direction
    - style-ref-color #       <p:style> <a:fillRef>/<a:lnRef> theme colour
    - blip-fill-shape #       <a:blipFill> as the fill of a <p:sp>

item_fields:
  id: stable local identifier; upstream-issue-N / upstream-pr-N for upstream, sf-<slug> for downstream
  source: github reference (owner/repo#N or github.com issues/pull URL) for upstream; slide-factory[:path] for downstream-need
  type: issue, pull-request, or downstream-need
  first_seen: ISO date when recorded locally
  last_reviewed: ISO date when last classified
  status: one vocabulary.statuses value
  priority: one vocabulary.priorities value
  target_area: list of vocabulary.target_areas values
  applies_to_current_project: one vocabulary.applies_to_current_project value
  non_target_reasons: list of vocabulary.non_target_reasons values
  summary: short one-line summary
  constructs: optional; list of vocabulary.constructs OOXML construct keys this entry gates (read by the slide-factory replication capability audit)
  current_project_notes: local decision note; for downstream-need, the full design rationale belongs here
  stopgap: optional; the slide-factory file the gap forces a workaround in (downstream-need only)
  evidence: local evidence gathered against this checkout
  next_action: next local action or none

# Add an upstream item by hand following the example below. Add a downstream-need
# the easy way with `pnpm run backlog -- add` (see --help), then write its design
# rationale into current_project_notes as a block scalar.
#
# items:
# - id: upstream-issue-1234
#   source: gitbrent/PptxGenJS#1234
#   type: issue
#   first_seen: 2026-06-07
#   last_reviewed: 2026-06-07
#   status: interesting-with-tweaks
#   priority: p1
#   target_area:
#     - powerpoint-repair
#     - invalid-ooxml
#   applies_to_current_project: partial
#   non_target_reasons: []
#   summary: PowerPoint repair report for a generated chart.
#   current_project_notes: >
#     The behavior may apply, but the upstream fix also touches legacy package
#     artifacts. Re-evaluate only the emitted OOXML behavior.
#   evidence:
#     kinds: []
#     local_files: []
#     schema_fixture: null
#     validator_result: null
#     powerpoint_result: null
#     spec_refs: []
#   next_action: create-minimal-repro
items:
  - id: upstream-pr-1447
    source: "gitbrent/PptxGenJS#1447"
    type: pull-request
    first_seen: 2026-06-07
    last_reviewed: 2026-06-20
    status: deferred
    priority: p2
    target_area:
      - missing-pptx-feature
      - package-boundary
    applies_to_current_project: partial
    non_target_reasons:
      - legacy-dist-artifact
    summary: Add native PowerPoint comments and generated comment parts.
    current_project_notes: |
      Native comments may fit the feature target, but the upstream PR carries
      generated dist, CJS, and bundle changes that do not fit this fork. Treat
      only the OOXML/package-part behavior as reusable signal: take the OOXML
      intent and re-implement against the fork's ESM/TS boundary, discarding the
      upstream dist/CJS/bundle changes.

      ON STAND-BY — do not build until scheduled. Fixture strategy (folded in from
      the retired CREATE_FIXTURES_PLAN_GENERATION.md): this is a write/serialization
      feature, so the primary evidence is a serialization schema fixture in
      test/schema.test.js asserting the exact OOXML the writer emits (option ->
      attribute/part), run with `pnpm run test:schema`. A PowerPoint-authored .pptx
      is an authoring ORACLE only (no read accessor for comments): use it to
      discover/pin the correct part wiring, content types, namespaces, and idx
      numbering, then assert against it in a comparison/inspection check — NOT
      test:read. See the "Fixture-Gated Work" section in docs/backlog-workflow.md.

      OOXML shape to pin. PowerPoint has two comment formats (365 writes modern,
      still reads legacy); decide which the fork emits (modern is the realistic
      target; legacy is the simpler ISO/IEC 29500 baseline) and fixture accordingly.
      - Legacy comments (ISO/IEC 29500 §13): per-slide Comments part
        /ppt/comments/comment{N}.xml, root <p:cmLst>, content type
        application/vnd.openxmlformats-officedocument.presentationml.comments+xml,
        implicit relationship from each authoring Slide part; body
        <p:cm authorId dt idx><p:pos x y/><p:text>…</p:text></p:cm>. Plus the
        presentation-level Comment Authors part /ppt/commentAuthors.xml, root
        <p:cmAuthorLst>, content type …presentationml.commentAuthors+xml, implicit
        relationship from the Presentation part; body
        <p:cmAuthor id name initials lastIdx clrIdx/>.
      - Modern comments (PowerPoint 2021+, MS-PPTX 2.16): per-slide modern-comment
        part whose <cm> carries id/authorId/created/status/etc. and a <txBody> +
        <replyLst>, anchored by content monikers (pc:sldMkLst) rather than pos, plus
        a presentation-level /ppt/authors.xml (Authors part) listing <author>s.
      Fixtures to add (with the feature):
      - Schema fixture(s) in test/schema.test.js asserting the emitted comment part
        XML, the commentAuthors/authors part, the Content_Types.xml Overrides, and
        the slide->comments and presentation->authors relationships — for a deck
        with one author + one comment, and ideally a two-author/multi-comment case
        to pin per-author idx numbering.
      - comments-reference.pptx oracle: a desktop-PowerPoint deck with a couple of
        comments by two authors, confirming the exact part layout/attributes the
        schema fixture asserts. Read-harness wiring is NOT required (no read getter).
    evidence:
      kinds: []
      local_files: []
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: revisit-only-if-scheduled-for-build

