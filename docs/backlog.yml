      slide-absolute coordinates; group bounds default to the bounding box of the children when
      x/y/w/h are omitted. Children reuse the slide-master `objects` descriptor shape
      (text/image/shape/rect/roundRect/line) via a shared `addChildDefinition` dispatch extracted
      from `createSlideMaster`. The per-object serialization in `gen-xml.ts` was extracted into a
      nested `renderSlideObjectXml` so the group case can render children recursively; child
      `<p:cNvPr id>` values are allocated from a counter seeded past the top-level objects to stay
      unique (collision-free across nesting depth).
