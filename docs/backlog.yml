      the `'group'` skip guard was removed. Auto-sizing recurses via a new `resolveObjBounds`
      helper in `gen-xml.ts`, so a parent group sizes around a nested auto-sized child group. The
      read side was already symmetric (Shape.absoluteFrame composes nested-group transforms,
