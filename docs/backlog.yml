    source: "gitbrent/PptxGenJS#1256"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-24
    status: implemented
    priority: p3
    target_area:
      - table-ooxml
      - missing-pptx-feature
    applies_to_current_project: partial
    non_target_reasons: []
    summary: Asked for a way to style table headers differently from body rows.
    current_project_notes: >
      Implemented 2026-06-24 as the `headerRow` inline-sugar shortcut. `addTable(rows,
      { headerRow: TableCellProps })` styles the first row distinctly without first calling
      defineTableStyle({ firstRow }). It is applied as DIRECT per-cell formatting baked onto
      row 0 (gen-objects.ts addTableDefinition STEP 1.5), so it flows through the normal cell
      pipeline (incl. border defaulting) and reuses existing OOXML emission — no new
      serialization path. The ambiguous-precedence footgun that previously held this is
      resolved by a single rule matching PowerPoint (direct formatting overrides a style
      region): explicit per-cell options on a row-0 cell win over headerRow, which wins over
      a tableStyle's firstRow region. headerRow also implies hasHeader (firstRow="1" for the
      accessibility marker) unless hasHeader is explicitly false. The caller's rows array is
      not mutated (row 0 and its cells are shallow-copied). Type: core-interfaces.ts
      TableProps.headerRow. Covered by regression test table-header-row.test.js (only row 0
      styled, explicit-cell-wins, hasHeader:false respected) and schema fixture
      'table with headerRow inline styling'. See CHANGELOG [Unreleased].
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
        - schema-fixture
        - validator-result
      local_files:
