    current_project_notes: |
      META / ledger-tooling enhancement, not a PPTX-generation feature — filed
      here because the ledger is the single place cross-repo needs are tracked.

      Problem (solved): the replication-lab feature audit
      (scripts/slide-analysis/replication) had to answer "is OOXML construct X a
      fork gap?" by joining a detected construct (e.g. prstTxWarp, custGeom,
      group-rot-flip, fillRef-sourced colour) to the backlog entry that gates it.
      The ledger had no machine-readable construct tag — `evidence.kinds` is
      evidence *provenance* (local-source-inspection, render-check, …), not OOXML
      construct identity — so the construct->entry mapping was hand-curated
      downstream in capability-map.ts and drifted as it grew.

      Resolved the open question fork-side: the construct vocabulary lives HERE.
      The fork owns the OOXML it emits/reads and already owns gap status, so the
      construct identity belongs next to it; the consumer keeps only its detector
      keys and joins on identity.

      Implemented:
      - `vocabulary.constructs` lists the stable construct keys (one per OOXML
        construct the replication detector recognises), each commented with the
        DrawingML element it identifies.
      - An optional `constructs:` item field (documented in item_fields) holds the
        keys an entry gates; validated for membership by scripts/backlog-ledger.mjs
        (optional — absent entries are fine, unknown keys error). `backlog -- add`
        gained a `--constructs a,b` flag and `show` prints the field.
      - Tagged the gating entries: sf-gradient-line-stroke (gradient-line-stroke),
        sf-group-rot-flip-frame (group-rot-flip), sf-text-fit-fontscale
        (autofit-shrink), sf-text-direction-serialization (vertical-text),
        sf-readmodel-style-followups (style-ref-color), sf-image-shape-fill
        (blip-fill-shape), sf-connector-preset-shapename (connector).
      - Consumer reaped: slide-factory capability-map.ts/audit.ts now read each
        capability's gating entry from this ledger's `constructs:` field instead of
        a hand-curated `backlog:` column, and the dangling upstream-pr provenance
        ids were dropped. The old stopgap (the hand-curated map) is gone.
