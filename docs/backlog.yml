  - id: upstream-issue-1006
    source: "gitbrent/PptxGenJS#1006"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-20
    status: implemented
    priority: p3
    target_area:
      - package-boundary
    applies_to_current_project: partial
    non_target_reasons: []
    summary: Reported JSZip generateAsync performance as a bottleneck for large presentations.
    current_project_notes: >
      The dominant cost for the reported case (large, media-heavy decks) is now
      addressed without changing the ZIP backend: already-compressed media parts
      (jpg/jpeg/png/gif/webp/heic/heif/avif and common audio/video) are written
      with per-entry STORE instead of DEFLATE, because their bytes are already
      entropy-coded and DEFLATE-ing them burned generateAsync CPU for a negligible
      size gain. XML parts still DEFLATE; `compression: false` still stores all;
      formats that benefit from DEFLATE (bmp/wav/tiff/emf/wmf/svg) are excluded.
      Landed in src/pptxgen.ts (ALREADY_COMPRESSED_MEDIA_EXTN + per-entry option in
      createChartMediaRels), a CHANGELOG Performance entry, and regression coverage
      in test/regression/zip-compression.test.js. The deeper root — single-threaded
      pure-JS DEFLATE in JSZip/pako — remains; swapping the backend to fflate is
      tracked separately as a deferred spike (see sf-fflate-zip-backend).
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
      local_files:
        - src/pptxgen.ts:190
        - src/pptxgen.ts:571
        - test/regression/zip-compression.test.js
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none

