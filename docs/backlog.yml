    non_target_reasons: []
    summary: Asked whether WebP images are supported.
    current_project_notes: >
      Resolved on inspection (2026-06-19): WebP IS supported. Image handling
      derives the extension/content type from the `data:` MIME (or file
      extension), so `image/webp` is packaged with the correct
      `<Override ContentType="image/webp">` and image relationship; PowerPoint
      2021/365 reads WebP. The natural-size header parser in gen-utils.ts
      (getImageSizeFromBase64) explicitly decodes the WebP RIFF/WEBP container
      (VP8 / VP8L / VP8X chunks), so a dimensionless WebP gets its real pixel size
      at 96 DPI. Already covered by the cross-format case in
      test/regression/image-intrinsic-size.test.js (a 4x2 webp resolves to
      38100x19050 EMU). No conversion/fallback is needed and no OOXML defect
      exists, so there is nothing to implement.
      Reclassified 2026-06-20: non-target → implemented. WebP is fully supported with
      direct regression coverage (image-intrinsic-size.test.js); recording it as a
      supported capability rather than a dismissal.
