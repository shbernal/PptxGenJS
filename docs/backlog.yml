  - id: upstream-pr-1431
    source: "gitbrent/PptxGenJS#1431"
    type: pull-request
    first_seen: 2026-06-07
    last_reviewed: 2026-06-20
    status: deferred
    priority: p3
    target_area:
      - missing-pptx-feature
    applies_to_current_project: partial
    non_target_reasons:
      - legacy-dist-artifact
      - upstream-build-system
    summary: Large animation engine for entrance, emphasis, exit, and motion-path animations.
    current_project_notes: |
      Animation OOXML is a broad new feature, not a repair signal. The PR touches
      generated bundles and legacy typings; take the OOXML intent and re-implement
      against the fork's ESM/TS boundary, not the upstream engine wholesale.

      INTEGRATION CONSTRAINT (new since 2026-06-16, issue-1434). The fork now ALREADY
      emits a slide-level <p:timing> tree for looping media — slideTimingToXml() in
      src/gen-xml.ts builds <p:timing><p:tnLst><p:par><p:cTn nodeType="tmRoot">… with
      per-media <p:audio>/<p:video> nodes, covered by the "media loop and loopCount"
      schema fixture in test/schema.test.js. A slide has at most ONE <p:timing>, so an
      animation engine cannot emit its own competing <p:timing>: it must EXTEND the
      existing tmRoot childTnLst (and add <p:bldLst>) alongside any looping-media nodes,
      not replace the helper. Start the animation model by generalizing slideTimingToXml
      into a shared timing-tree builder rather than greenfielding a parallel part model.

      ON STAND-BY — do not build until scheduled. Fixture strategy (folded in from
      the retired CREATE_FIXTURES_PLAN_GENERATION.md): this is a write/serialization
      feature, so primary evidence is a serialization schema fixture in
      test/schema.test.js asserting the emitted OOXML, run with `pnpm run
      test:schema`. A PowerPoint-authored .pptx is an authoring ORACLE only (no read
      accessor for animation timing): use it to discover/pin the correct OOXML shape,
      then assert against it in a comparison/inspection check — NOT test:read. See
      the "Fixture-Gated Work" section in docs/backlog-workflow.md.

      OOXML shape to pin. Animation OOXML lives in the slide's <p:timing> element
      (child of CT_Slide), which holds <p:tnLst> (the time-node tree of par/seq/cTn
      with behaviors anim/animEffect/animMotion/animRotation/animScale/set/cmd) and
      <p:bldLst> (per-shape build entries). Entrance/emphasis/exit/motion-path map to
      Microsoft-proprietary presetClass/presetID/presetSubtype values (MS-PPTX), so
      the correct integers MUST be captured from a real deck, not guessed.
      Fixtures to add (with the feature):
      - One PowerPoint-authored oracle deck per animation class (or one deck with a
        shape per class): a simple entrance (e.g. Fade/Appear), an emphasis, an exit,
        and a motion-path animation, each on a named shape — capturing the authentic
        presetClass/presetID/presetSubtype integers and tnLst/bldLst structure (the
        magnitudes-from-real-PowerPoint principle already used for the per-shape
        rotation angles in rotation-flip.pptx, sf-group-rot-flip-frame).
      - Schema fixture(s) in test/schema.test.js asserting the p:timing tree the
        writer emits for a minimal "fade-in on one shape" model first, expanding per
        class as the engine grows; validate against the oracle decks. Keep p3: a
        low-priority research signal, so oracle decks can be authored opportunistically
        to unblock the model design.
    evidence:
      kinds:
        - local-source-inspection
      local_files:
        - src/gen-xml.ts:2176
        - test/schema.test.js:2242
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: revisit-only-if-scheduled-for-build

  - id: upstream-issue-1360
    source: "gitbrent/PptxGenJS#1360"
    type: issue
