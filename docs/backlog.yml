  - id: upstream-issue-1456
    source: "gitbrent/PptxGenJS#1456"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-24
    status: partially-implemented
    priority: p2
    target_area:
      - missing-pptx-feature
    applies_to_current_project: yes
    non_target_reasons: []
    summary: Requests native editable PowerPoint math equations via LaTeX, MathML, or raw OMML.
    current_project_notes: >
      Raw-OMML leg implemented 2026-06-19. A text item gained a `math?: string`
      property (core-interfaces.ts TextProps) carrying raw OMML. genXmlTextBody
      emits it as a display-math paragraph via genXmlMathParagraph
      (<a14:m xmlns:a14 xmlns:m><m:oMathPara><m:oMathParaPr><m:jc m:val="centerGroup"/>
      <m:oMath>{OMML}</m:oMath></m:oMathPara></a14:m><a:endParaRPr/>), accepting inner
      OMML, a full <m:oMath>, or a full <m:oMathPara>. STEP 5/6 isolate the equation
      onto its own paragraph; objectHasMath then wraps the whole shape in
      <mc:AlternateContent><mc:Choice Requires="a14"> exactly as PowerPoint does, so
      validators/non-a14 consumers treat the a14 subtree as a known extension (the
      oracle math-omml.pptx uses the same envelope and validates clean). Pinned by the
      schema fixture 'native math equation (OMML) text run' (test/schema.test.js),
      validator-clean. REMAINING (DEFERRED 2026-06-19, no implementation planned):
      a LaTeX/MathML→OMML conversion path and an mc:Fallback raster. Both are out of
      active scope under the Node-first, minimal-dependency charter — LaTeX→OMML needs
      a typesetting parser dependency and the fallback raster requires actually
      rendering the equation (no browser/Office). The raw-OMML entry point is the
      deliberate, supported deliverable; callers convert from LaTeX/MathML with an
      external tool and supply OMML directly. A dependency-free MathML→OMML subset
      converter remains a possible future in-scope addition if a concrete consumer
      need appears; note it's not required for validity (Requires="a14" is understood
      by PowerPoint 2010+, so current output opens and validates clean without it).
    evidence:
      kinds:
        - local-source-inspection
        - schema-fixture
        - validator-result
        - powerpoint-authored-comparison
      local_files:
        - src/core-interfaces.ts
        - src/gen-xml.ts
        - test/schema.test.js
        - test/read/fixtures/math-omml.pptx
      schema_fixture: "test/schema.test.js: native math equation (OMML) text run"
      validator_result: pass (pnpm run test:schema, 2026-06-19)
      powerpoint_result: oracle test/read/fixtures/math-omml.pptx opened clean in Windows desktop PowerPoint 16.0 on 2026-06-19
      spec_refs: []
    next_action: none-remaining-legs-deferred-out-of-active-scope

  - id: upstream-issue-1451
    source: "gitbrent/PptxGenJS#1451"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-24
    status: implemented
    priority: p3
    target_area:
      - table-ooxml
      - missing-pptx-feature
    applies_to_current_project: partial
    non_target_reasons: []
    summary: Requests automatic table column scaling so many columns fit within slide width.
    current_project_notes: >
      Implemented as opt-in `fitColumns: 'shrink'` on TableProps. In
      addTableDefinition (gen-objects.ts), after the existing width-calc resolves
      colW/w, a shrink pass computes the usable width (slide width - x - right
      margin) and, when the total exceeds it, scales every column by the same
      factor (or clamps a too-wide `w`). Rewriting the widths at the table
      definition means both the XML emitter and the measured-fit pass inherit the
      fitted grid. Shrink only, no minimum-width floor; off by default so existing
      explicit widths are unchanged.
    evidence:
      kinds:
        - local-source-inspection
        - regression-test
        - schema-fixture
        - validator-result
      local_files:
        - src/core-interfaces.ts (TableProps.fitColumns)
        - src/gen-objects.ts (addTableDefinition shrink-to-fit pass)
        - test/regression/table-fit-columns.test.js
        - test/schema.test.js (table-fit-columns fixture)
      schema_fixture: "table with fitColumns shrink-to-fit (upstream-issue-1451)"
      validator_result: pass
      powerpoint_result: null
      spec_refs: []
    next_action: none

  - id: upstream-issue-1423
    source: "gitbrent/PptxGenJS#1423"
    type: issue
    first_seen: 2026-06-07
    last_reviewed: 2026-06-19
    status: non-target
    priority: none
    target_area:
      - chart-ooxml
    applies_to_current_project: no
    non_target_reasons:
      - insufficient-evidence
    summary: Reports that manually adding a new dimension in the embedded Excel data does not update chart display.
    current_project_notes: >
      Reviewed 2026-06-19 against the generator. Charts emit a fixed reference range
      (e.g. <c:f>Sheet1!$A$2:$A$N</c:f>) sized to the supplied data, plus a matching
      numCache/strCache — standard, valid OOXML. A chart only plots what its c:f range
      covers; manually inserting a row in the embedded worksheet does NOT auto-extend
      that range in any viewer (auto-expansion is an Excel "Table"/structured-reference
      feature, not default chart behavior). So the reported "defect" is expected
      fixed-range behavior, not a generator bug, and the screenshot-only report shows
      no malformed range/cache. Marked non-target/insufficient-evidence. Reopen only
      if a repro shows the emitted c:f range or cache is itself malformed.
    evidence:
      kinds:
        - local-source-inspection
      local_files:
        - src/gen-charts.ts:973
        - src/gen-charts.ts:992
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none

