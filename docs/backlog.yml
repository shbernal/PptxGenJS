  - id: sf-importslide-restyle-literals
    source: slide-factory
    type: downstream-need
    first_seen: 2026-06-18
    last_reviewed: 2026-06-24
    status: implemented
    priority: p3
    target_area:
      - missing-pptx-feature
    applies_to_current_project: yes
    non_target_reasons: []
    summary: "importSlide restyle: optional force-remap of literal colours + copy source table style into destination"
    current_project_notes: |
      IMPLEMENTED 2026-06-24. importSlide theme: 'restyle' gained a single opt-in
      `remapLiterals` flag (ImportSlideOptions) that pushes the re-brand past what
      symbolic references reach, covering both originally-deferred legs:

      Leg (a) — literal force-remap: `remapLiteralColors(slideRoot, ctx)` in
      src/read/oxml/theme.ts is the inverse of `resolveSchemeColors`. It builds a
      reverse source clrScheme (RGB -> slot, SCHEME_SLOTS order so the first slot
      wins on a shared RGB) and reverse clrMap (slot -> token), then rewrites every
      literal `a:srgbClr` whose value equals a source slot to `<a:schemeClr>` routed
      through the source clrMap (dk1/lt1/… fall back to the slot name, itself a valid
      token). Transforms are carried across; a literal matching no slot is untouched.

      Leg (b) — table-style copy: `#copySourceTableStyles(sourceOpc, slideRoot)` in
      src/read/api/presentation.ts gathers the slide's `<a:tableStyleId>` ids, then
      copies the matching source `<a:tblStyle>` into this deck's tableStyles.xml under
      the SAME id (rejected the "fresh id" idea from the original note — no collision
      since the destination lacks the id, and same-id keeps built-in identity and
      needs no table-XML rewrite). Idempotent (an id the deck already defines is left
      alone), and `#ensureTableStylesPart()` creates + wires a tableStyles.xml part
      (presentation rel + content type) when the deck has none. The copied definition
      is symbolic, so it re-brands to this deck's theme.

      Both legs wire through `#importSlideRestyle(... , remapLiterals)`, after the
      existing `restyleSlide` drop-clrMapOvr pass. Default (flag off) preserves the
      prior byte-identical-literal guarantee.

      Source-of-truth fixture is multi-theme.pptx slide 3 (index 2): literal B01513
      == Ion accent1 (remap match), 123456 (negative control), and a table referencing
      {5C22544A-7EE6-4342-B048-85BDC9FD1C3A} ("Medium Style 2 - Accent 1") whose
      `<a:tblStyle>` lives in the source tableStyles.xml. Tests in
      test/read/import-slide-restyle.test.js cover positive remap, negative control,
      default-off guarantee, table-style copy + idempotency, no-copy-without-flag, and
      schema validity (validator clean).
    evidence:
