    summary: "importSlide v1 gaps: embedded fonts, slide-size rescale, notes import"
    current_project_notes: |
      importSlide copies a slide's slideLayout -> slideMaster -> theme plus used
      media/chart/embedding parts. Three gaps are deliberately out of scope for v1:
        - Embedded fonts are not copied. Fonts embedded via embedTrueType live in
          ppt/fonts/* and are referenced from presentation.xml (p:embeddedFontLst),
          not from the slide, so importSlide does not bring them across; a slide
          relying on an embedded font may substitute on render. Deferred (low
          priority): the first consumer normalizes lifted text to Aptos during the
          edit pass, so font fidelity doesn't depend on carrying embedded faces.
          Follow-up: copy the font parts and merge p:embeddedFontLst.
        - Slide size must match. importSlide asserts source/target p:sldSz are
          equal and throws otherwise; no geometry rescaling. Follow-up: optional
          EMU rescale when sizes differ.
        - Source notes are dropped by design (the notesSlide relationship is
          skipped so the import doesn't drag in a notesMaster + its own theme).
          Follow-up: opt-in notes import that copies/merges the notes master.
