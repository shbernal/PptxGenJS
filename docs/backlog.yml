    current_project_notes: |
      RESOLVED. TextBaseProps.textDirection ('horz' | 'vert' | 'vert270' |
      'wordArtVert') was a public option, but the text-box body-prop transform in
      gen-objects.ts only read the undocumented `vert` alias, so textDirection was
      silently dropped and text rendered horizontal. (Tables already honored
      textDirection via the <a:tcPr vert="…"> path in gen-xml.ts.) Fix:
      gen-objects.ts now sets `_bodyProp.vert = itemOpts.textDirection ?? itemOpts.vert`,
