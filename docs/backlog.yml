      JPEG assertion via new contentTypeForExtension() helper in test/helpers.js).
      gen-xml.ts makeXmlContTypes was left unchanged as predicted.

      On the write path the image content type is built inline as
      ('image/' + strImgExtn) at every media-rel push site, so an `emf`
      extension yields `image/emf` and `wmf` yields `image/wmf`. The
      OOXML-correct values are `image/x-emf` and `image/x-wmf`. The read side
      already expects the correct forms: IMAGE_EXTENSION_BY_CONTENT_TYPE maps
      `image/x-emf` -> emf / `image/x-wmf` -> wmf (src/read/api/shapes.ts:53-54),
      and extFromContentType() strips a leading `x-`. So the package is
      internally asymmetric: it writes a content type it would not itself read
      back as EMF/WMF.

      Fix: introduce one extension -> content-type helper (the inverse of the
      read-side IMAGE_EXTENSION_BY_CONTENT_TYPE) and use it at every `type:`
      assignment AND the matching duplicate-guard comparisons:
        - src/gen-objects.ts:774 (addImageDefinition push) and :768 (guard)
        - src/gen-objects.ts:592 (image-fill push) and :586 (guard)
        - src/gen-objects.ts:1796 (background path push)
      Special-case emf -> image/x-emf, wmf -> image/x-wmf; keep
      svg -> image/svg+xml and jpg -> jpeg. src/gen-xml.ts makeXmlContTypes
      (~:2048) needs no change: it emits whatever rel.type it is handed via
      <Default Extension=.. ContentType=..>.

      Impact: LibreOffice tolerates `image/emf`, so the slide-factory EMF
      replica (eu-ai-act-formation__081, embedding image77.emf) renders today;
      PowerPoint may be stricter, which is why this is recorded rather than
      relied upon. No slide-factory workaround is in place (hence no stopgap) -
      the kit's icon() simply embeds the EMF and accepts the current content
      type.
