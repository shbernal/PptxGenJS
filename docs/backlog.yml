      read-model work whose oracle must be genuine PowerPoint output. When a reader
      is scheduled, FIRST author a custGeom fixture with the
      powerpoint-fixture-authoring skill (one freeform shape with a known path —
      moveTo/lineTo/cubicBezTo + close, plus recorded path extents), record
      provenance + SHA-256 in test/read/fixtures/README.md, then wire the read test
      to that fixture. Do not build the accessor against synthetic/hand-typed path
      XML.

      2026-06-21 — IMPLEMENTED. Fixture test/read/fixtures/custgeom.pptx authored in
      desktop PowerPoint (freeform-lines / freeform-cubic / freeform-hole + a
      preset-rect negative), provenance + SHA-256 in test/read/fixtures/README.md.
      Reader: Shape.customGeometry getter (src/read/api/shapes.ts) returns a faithful
      CustomGeometry { paths: CustomGeometryPath[] } — each a:path keeps its own
      path-unit w/h + fill/stroke (schema defaults applied) and an ordered
      GeometryCommand[] (moveTo/lnTo/cubicBezTo/quadBezTo/arcTo/close; verbs mirror
      the write-side GeometryPoint DSL; arc angles exposed in degrees). Multi-path
      array chosen over flattening to the single-path write DSL because a:pathLst is
      repeatable with per-path fill/stroke. Empirical finding pinned by the
      freeform-hole fixture: PowerPoint's own Merge Shapes never emits more than one
      a:path — a hole is one path with two moveTo…close contours — so paths.length is
      1 for PowerPoint-authored freeforms (multi-a:path is schema-legal but only from
      other producers e.g. SVG import). Types exported from src/read.ts. Tests:
