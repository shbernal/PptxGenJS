    summary: "Accept an explicit fontScale/lnSpcReduction so measured consumers can render fit:'shrink'"
    current_project_notes: |
      RESOLVED (entry was stale; the feature already shipped). The chosen API
      shape extends `fit` to an object form: fit?: 'none' | 'shrink' | 'resize'
      | TextFitShrinkProps, where TextFitShrinkProps = { type: 'shrink',
      fontScale?, lnSpcReduction? } (core-interfaces.ts ~1743-1823). Values are
      authored as a percent (0-100) and serialized to 1000ths of a percent by
      genXmlNormAutofit() (gen-xml.ts ~1488), which warns-and-ignores out-of-range
      / NaN inputs per the library's warn-rather-than-degrade policy. genXmlBodyProperties
      emits <a:normAutofit fontScale="…" lnSpcReduction="…"/> for the object form
      while bare 'shrink' still emits <a:normAutofit/>. This keeps measurement
      downstream while letting a measuring consumer bake a static scale that
      actually renders without a manual edit. Covered by
      test/regression/text-fit-shrink.test.js (asserts 85->85000, 62.5->62500,
      lnSpcReduction omitted when undefined).
