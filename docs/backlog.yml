      (src/gen-utils.ts) the writer uses; colspan/rowspan resolve through a new
      shared walkTableGrid generator that the measured-fit shrink pass
      (measureTableCells) was refactored onto, so placement cannot drift. Row
      heights are exact when pinned by rowH (array/scalar) or table h; auto-height
      rows are estimated with the same conservative (tall) measureText line model
      and flagged heightExact:false. Scope: single, un-paginated table — autoPage
