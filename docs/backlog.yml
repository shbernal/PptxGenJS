    source: slide-factory:scripts/slide-analysis/replication/capability-map.ts
    type: downstream-need
    first_seen: 2026-06-18
    last_reviewed: 2026-06-18
    status: target-candidate
    priority: p3
    target_area:
      - typescript-api
    applies_to_current_project: yes
    non_target_reasons: []
    summary: "Add a structured constructs: field (OOXML construct kinds) to downstream-need entries so consumers can join detected constructs to gaps data-driven, not via a hand-curated downstream map"
    current_project_notes: |
      META / ledger-tooling enhancement, not a PPTX-generation feature — filed
      here because the ledger is the single place cross-repo needs are tracked.

      Problem: the replication-lab feature audit (scripts/slide-analysis/replication)
      must answer "is OOXML construct X a fork gap?" by joining a detected
      construct (e.g. prstTxWarp, custGeom, group-rot-flip, fillRef-sourced
      colour) to the backlog entry that gates it. The ledger has no
      machine-readable construct tag — `evidence.kinds` is evidence *provenance*
      (local-source-inspection, render-check, …), not OOXML construct identity —
      so the construct->entry mapping is hand-curated downstream in
      capability-map.ts. That map has to be kept in sync with the ledger by hand
      and will drift as it grows.

      Proposal: add an optional `constructs:` list to entries (at least
      downstream-need), holding stable OOXML construct keys (a small controlled
      vocabulary, e.g. `prst-txwarp`, `cust-geom`, `group-rot-flip`,
      `style-fill-ref`, `grad-fill`, `normautofit-shrink`, `bodypr-vert`). Then a
      consumer derives "construct -> gating entry -> live status" directly from
      the ledger, and the downstream capability map shrinks to just the detector
      keys. Define the vocabulary under `vocabulary:` (like `evidence_kinds`) and
      have the validator check membership. Backwards-compatible: the field is
      optional and absent on upstream entries.

      Open question: whether the construct vocabulary lives here (fork owns the
      OOXML it emits/reads) or stays slide-factory-side (consumer owns "what we
      hit"). Leaning fork-side, since the gap status already lives here.
    stopgap: slide-factory:scripts/slide-analysis/replication/capability-map.ts
