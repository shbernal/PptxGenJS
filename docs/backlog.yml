      the measureText/overflowsBox precedent): returns per-cell
      {row,col,rowSpan,colSpan,xIn,yIn,wIn,hIn,heightExact} in inches plus overall
      widthIn/heightIn, so a consumer can place images/shapes over cells without
      adding the table to a slide. Engine computeTableLayout in src/measure-fit.ts.
