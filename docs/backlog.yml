  - id: sf-measured-text-fit
    source: slide-factory
    type: downstream-need
    first_seen: 2026-06-21
    last_reviewed: 2026-06-21
    status: implemented
    priority: p2
    target_area:
      - missing-pptx-feature
      - typescript-api
    applies_to_current_project: yes
    non_target_reasons: []
    summary: "Serialize-time measured autofit: compute and bake fontScale/lnSpcReduction (shrink) and ext.cy/off.y (resize) so fit:'shrink'/'resize' actually fit in headless renders"
    constructs:
      - autofit-shrink
      - autofit-resize
    current_project_notes: |
      Feature doc: docs/measured-text-fit.md. Bare <a:normAutofit/> / <a:spAutoFit/>
      defer the fit computation to an interactive edit/resize that a headless
      LibreOffice->PNG render never fires, so fit:'shrink'/'resize' overflow in the
      slide-factory pipeline (the "text spills out of the card" driver). The fix
      adds opentype.js font metrics, a wrap simulator, and shrink/resize solvers
      calibrated against PowerPoint, gated by a fixture oracle.

      BLOCKING FIXTURE PRECONDITION (calibration oracle, docs/measured-text-fit.md) -- DONE
      2026-06-21. Four desktop-PowerPoint-authored decks committed to
      test/read/fixtures/ (autofit-line-metrics 90 cases, autofit-shrink 29,
      autofit-resize 19, autofit-edge 11) plus the extracted, regenerable
      autofit-calibration.json with a LibreOffice cross-measure column. Oracle
      findings that parameterize the solver: single-spacing line pitch ~= 1.2117 x
      fontSize and font-INDEPENDENT across {Aptos, Aptos SemiBold, Calibri, Tahoma,
      Arial} (the per-font axis is advance WIDTH, not line height); fontScale sits on
      a 2.5% grid {...,85,77.5,70,62.5,55,...,40,...}%; lnSpcReduction ramps 0->10->20%
      and caps at 20%; vertical anchor does NOT change fontScale; on spAutoFit growth
      off.y shifts by 0 / half / full of the height delta for anchor t / ctr / b;
      PowerPoint vs LibreOffice autofit height agree to <=0.05pt for this font set.

      P1 (measurement + shrink solver) -- DONE 2026-06-21. Landed:
      src/font-metrics.ts (opentype.js provider via raw charToGlyph advances, NO
      GPOS/GSUB -- getAdvanceWidth() runs shaping and even throws on unsupported
      lookups; FontMetricsRegistry keyed by face+bold+italic with regular fallback);
      src/text-fit.ts (greedy wrap=square simulator + shrink solver, line pitch
      1.2117, 2.5% grid, 25% floor, conservative WIDTH/HEIGHT safety factors 1.03/1.04
      that approximate PowerPoint's DPI advance rounding so it wraps slightly earlier);
      src/measure-fit.ts (extracts paragraphs/runs mirroring gen-xml grouping +
      inheritance, computes inner box from w/h/insets/margin, rewrites fit:'shrink' ->
      object form before the sync XML pass); pptx.registerFontMetrics() public API +
      RuntimeAdapter.loadFontData (node fs / browser fetch). lnSpcReduction left at 0
      (fontScale-only is provably <= PowerPoint's, the conservative direction; the
      reduction-ramp data is recorded for a future refinement). Tests:
      test/regression/text-fit.test.mjs (deterministic synthetic metrics),
      test/regression/measured-fit-integration.test.mjs (end-to-end via dist),
      test/read/autofit-calibration-oracle.test.mjs (computed fontScale <= PowerPoint's
      across the real-font Aptos shrink cases; skips when fonts absent, e.g. CI).

      P2 (resize solver) -- DONE 2026-06-21. Landed: text-fit.ts solveResize (reuses
      the wrap simulator at fontScale=100; returns the needed inner height inflated by
      the same WIDTH/HEIGHT safety factors -- resize has no shrink fallback so it MUST
      err tall); measure-fit.ts resize branch rewrites options.h (and options.y per the
      resolved vertical anchor _bodyProp.anchor: off.y shifts by 0 / half / full of the
      height delta for t / ctr / b) as "<emu>emu" strings before the sync XML pass, so
      gen-xml emits the baked ext.cy/off.y while keeping the <a:spAutoFit/> marker.
      Matches spAutoFit semantics (box shrinks OR grows to fit). A separate warn-once
      path covers unmeasured resize boxes. Tests extended: solveResize unit cases
      (text-fit.test.mjs), resize integration via dist (measured-fit-integration.test.mjs:
      overflow grows, short text shrinks, anchor offset), and a resize oracle block in
      autofit-calibration-oracle.test.mjs (computed cy >= PowerPoint's AND >= LibreOffice's
      across all 19 resize cases). CAVEAT (carried from plan risks): resize grows the text
      box only, not a grouped card background/icon -- that layout coordination stays in the
      consumer.

      P3 (table cells + unregistered-font heuristic) -- DONE 2026-06-21, feature COMPLETE.
      KEY OOXML FINDING: PowerPoint has no text-autofit for table cells -- a:tcPr
      (CT_TableCellProperties) carries no autofit child, and the app ignores normAutofit
      inside a cell txBody (rows auto-grow instead). So TableCellProps.fit:'shrink' (new
      public field; also cascades from a table-level fit:'shrink') cannot bake a fontScale;
      instead measure-fit.ts walks the cell grid (colspan/rowspan via an occupancy sweep;
      column widths from the shared resolveTableColWidthsEmu; row heights from rowH/table h;
      cell margins + table->cell inheritance), runs the SAME calibrated shrink solver, and
      bakes a REDUCED LITERAL font size (floored to 0.1pt) onto the cell runs -- which both
      PowerPoint and LibreOffice render identically with no edit/resize. Only fixed-height
      rows are touched; auto-height rows are skipped (they grow). Options objects are cloned
      before mutation because plain-string cells share the table's single `opt` object.
      'resize'/object forms are ignored for cells (a row already auto-grows ~ spAutoFit).
      HEURISTIC: getHeuristicFontMetrics() (src/font-metrics.ts) is a conservative,
      width-over-estimating per-char advance table; when a deck registered SOME metrics, a
      named face with no exact metrics now falls back to it (text boxes AND cells) and bakes
      an approximate fit + warns once, instead of degrading to the bare flag. A deck with no
      metrics at all stays a full no-op; an unnamed/theme-default face stays unmeasurable.
      PRECONDITION BUG FIXED: auto-width tables (w without colW, or neither) emitted
      ~0-EMU gridCol widths (raw inches divided and written as EMU, e.g. w=9 -> gridCol
      w="3"), collapsing columns to a sliver in PowerPoint/LibreOffice; gen-xml now divides
      the resolved EMU width via resolveTableColWidthsEmu. Tests: table-cell-fit.test.mjs,
      font-heuristic.test.mjs, table-colwidth-distribution.test.js; measured-fit-integration
      updated for the heuristic behavior change.

      P4 (layout-time public measure API) -- DONE 2026-06-21.
      Surfaces the (previously internal) calibrated wrap model as a PUBLIC API so a
      consumer can size its own geometry BEFORE export (grow a card, reflow a grid,
      overflow lint) using the SAME model the export bake uses -- no second wrap math,
      so a layout-time prediction never disagrees with the baked result. Landed:
      pptx.measureText(text, {wIn, fontSize, fontFace, ...}) -> {heightIn (conservative/
      tall, == the resize bake), lineCount, measurable, fitsBox(hIn), shrinkScaleFor(hIn)}
      and pptx.overflowsBox(text, {wIn, hIn, ...}) (conservative, for a warning not a
      gate); new pptxgenjs/measure subpath re-exporting the pure primitives
      (measureLayout/measureHeightPt/solveShrink/solveResize + types + constants +
      parseFontMetrics/getHeuristicFontMetrics/FontMetricsRegistry) for standalone use
      without a PptxGenJS instance (opentype.js stays lazy). SINGLE SOURCE OF TRUTH
      (the one bug this must not introduce): extractParagraphs was refactored to share
      buildFitParagraphs with measureText, applyMeasuredFit's resolver was extracted to
      makeRegistryResolver (shared), and measureHeightPt now wraps a new measureLayout
      (height + lineCount). New public types MeasureTextOptions/TextMeasurement/
      OverflowBoxOptions (core-interfaces.ts). Tests: measure-text-api.test.mjs incl. the
      no-drift assertion (measureText height == solveResize bake height for the same
      input). Design: docs/measured-text-fit.md ("Layout-time measurement (public API)").
    evidence:
      kinds:
        - powerpoint-result
        - powerpoint-authored-comparison
        - extracted-xml
        - local-source-inspection
      local_files:
        - src/font-metrics.ts
        - src/text-fit.ts
        - src/measure-fit.ts
        - src/measure.ts
        - src/pptxgen.ts
        - src/gen-utils.ts
        - src/gen-xml.ts
        - src/core-interfaces.ts
        - test/regression/measure-text-api.test.mjs
        - test/regression/text-fit.test.mjs
        - test/regression/measured-fit-integration.test.mjs
        - test/regression/table-cell-fit.test.mjs
        - test/regression/font-heuristic.test.mjs
        - test/regression/table-colwidth-distribution.test.js
        - test/read/autofit-calibration-oracle.test.mjs
        - test/read/fixtures/autofit-calibration.json
        - test/read/fixtures/autofit-line-metrics.pptx
        - test/read/fixtures/autofit-shrink.pptx
        - test/read/fixtures/autofit-resize.pptx
        - test/read/fixtures/autofit-edge.pptx
        - scripts/extract-autofit-calibration.mjs
        - docs/measured-text-fit.md
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
    next_action: none
