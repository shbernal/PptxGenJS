  - id: sf-doc-render-caveats
    source: slide-factory
    type: downstream-need
    first_seen: 2026-06-18
    last_reviewed: 2026-06-18
    status: target-candidate
    priority: p3
    target_area: []
    applies_to_current_project: yes
    non_target_reasons: []
    summary: "Document PowerPoint-vs-LibreOffice render caveats the library intentionally does not guarantee"
    current_project_notes: |
      Because PptxGenJS does no glyph measurement or line-breaking, several text
      behaviors emit correct OOXML yet render differently across PowerPoint,
      LibreOffice, and the intended layout. These are documented limitations, not
      bugs, and their guard lives downstream (slide-factory has fonts + LibreOffice
      and can measure/resize before addText). Write them down in the fork docs so
      every consumer knows what schema fixtures intentionally do NOT assert:
        - fit:'shrink' emits a bare <a:normAutofit/>; the fontScale/lnSpcReduction
          variant is deliberately omitted because PowerPoint computes it on
          edit/resize, so generated decks overflow until a human touches the shape.
        - wrap:false reliably emits wrap="none", but whether text overflows or is
          clipped is renderer-defined (PowerPoint spills, LibreOffice may clip).
        - breakLine faithfully splits paragraphs, but the resulting visual line
          count (and whether it fits) is layout-dependent.
      We may still add serialization-contract fixtures later (assert "option X
      emits attribute Y" only) but framed strictly as XML assertions, never as
      rendering guarantees.
    evidence:
      kinds: []
      local_files:
        - src/gen-xml.ts
      schema_fixture: null
      validator_result: null
      powerpoint_result: null
      spec_refs: []
