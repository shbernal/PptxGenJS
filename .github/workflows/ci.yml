name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - mainline
      - master

jobs:
  validate:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 24.x
          - 26.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install OOXML validator
        run: ./tools/ooxml-validator/install.sh

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build package artifacts
        run: npm run build:dist

      - name: Check package manifest
        run: npm run pack:check

      - name: Smoke test packed package
        run: npm run test:package

      - name: Smoke test demos
        run: npm run test:demos
