name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - mainline
      - master

jobs:
  validate:
    name: Node 24
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install OOXML validator
        run: ./tools/ooxml-validator/install.sh

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build package artifacts
        run: npm run build:dist

      - name: Check package manifest
        run: npm run pack:check

      - name: Smoke test packed package
        run: npm run test:package
