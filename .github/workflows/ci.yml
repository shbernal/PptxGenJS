name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - mainline
      - master

permissions:
  contents: read

jobs:
  validate:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 24.x
          - 26.x

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install OOXML validator
        run: ./tools/ooxml-validator/install.sh

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build package artifacts
        run: pnpm run build

      - name: Lint package manifest
        run: pnpm run package:lint

      - name: Check package manifest
        run: pnpm run pack:check

      - name: Smoke test packed package
        run: pnpm run test:package

      - name: Smoke test demos
        run: pnpm run test:demos
