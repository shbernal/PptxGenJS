name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    if: github.repository == 'shbernal/PptxGenJS'
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          pnpm --version

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_REF="v$PACKAGE_VERSION"

          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "::error::Publishing must run from a tag. Select tag '$EXPECTED_REF' for manual runs."
            exit 1
          fi

          if [ "$GITHUB_REF_NAME" != "$EXPECTED_REF" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match package version '$PACKAGE_VERSION'. Expected '$EXPECTED_REF'."
            exit 1
          fi

      - name: Verify version is unpublished
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "::error::$PACKAGE_NAME@$PACKAGE_VERSION is already published on npm."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install OOXML validator
        run: ./tools/ooxml-validator/install.sh

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: Build package artifacts
        run: pnpm run build

      - name: Lint package manifest
        run: pnpm run package:lint

      - name: Check package manifest
        run: pnpm run pack:check

      - name: Smoke test packed package
        run: pnpm run test:package

      - name: Smoke test demos
        run: pnpm run test:demos

      - name: Verify npm pack contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        run: npm publish --access public --provenance --ignore-scripts
